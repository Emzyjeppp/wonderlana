<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LANAUTICA — WonderLana</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Bungee&family=Fraunces:ital,opsz,wght@0,9..144,900;1,9..144,600&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    /* sisi teater (100th show) */
    --stage:  #2B0A16;
    --curtain:#C2274B;
    --curtain-d:#8A1234;
    --bulb:   #FFC85C;
    --mint:   #9FE3C7;
    /* sisi pesta (seitansai 20) */
    --cream:  #FFF7F1;
    --pink:   #FF6B9D;
    --rose:   #C93E6E;
    --plum:   #47203C;
    --gold:   #E8A93C;
    /* netral */
    --ink:    #1A0710;
  }
  *{ box-sizing:border-box; margin:0; }
  html,body{ height:100%; }
  body{
    font-family:'Plus Jakarta Sans', sans-serif; color:#fff;
    overflow:hidden; min-height:100vh; position:relative;
    background:
      radial-gradient(ellipse 55% 50% at 15% 25%, rgba(255,200,92,0.14), transparent 60%),
      radial-gradient(ellipse 55% 55% at 85% 78%, rgba(255,107,157,0.16), transparent 62%),
      radial-gradient(ellipse 90% 70% at 50% 40%, #3D1526, transparent 75%),
      linear-gradient(160deg, #2B0A16 0%, #1A0710 100%);
  }
  @media (prefers-reduced-motion: reduce){ *{ animation:none !important; transition-duration:.001ms !important; } }

  /* ---------- lapisan bintang di atas latar gelap ---------- */
  #sky{ position:fixed; inset:0; z-index:0; pointer-events:none; }
  .spark{ position:absolute; border-radius:50%; animation:twinkle var(--tw,3s) ease-in-out infinite; }
  @keyframes twinkle{ 0%,100%{ opacity:var(--o,.6); } 50%{ opacity:.08; } }

  /* ---------- panggung utama ---------- */
  .stage{
    position:relative; z-index:2; min-height:100vh;
    display:grid; grid-template-columns:1fr 1.15fr; align-items:center; gap:40px;
    max-width:1080px; margin:0 auto; padding:48px 32px;
  }

  .portrait-col{ display:flex; justify-content:center; }
  .portrait{ position:relative; width:min(320px, 74vw); aspect-ratio:4/5; animation:rise 1.1s cubic-bezier(.2,.8,.2,1) both; }
  @keyframes rise{ from{ opacity:0; transform:translateY(26px) scale(.97); } to{ opacity:1; transform:none; } }
  .portrait .halo{
    position:absolute; inset:-24px; border-radius:28px;
    background:conic-gradient(from 0deg, rgba(255,200,92,0.4), rgba(255,107,157,0.4), rgba(255,200,92,0.4));
    filter:blur(14px); animation:breathe 5s ease-in-out infinite;
  }
  @keyframes breathe{ 0%,100%{ opacity:.65; transform:scale(1) rotate(0deg); } 50%{ opacity:.95; transform:scale(1.05) rotate(8deg); } }
  .portrait .frame{
    position:absolute; inset:0; border-radius:20px; overflow:hidden;
    border:2px solid rgba(255,255,255,0.35);
    box-shadow:0 24px 60px rgba(0,0,0,0.5), inset 0 0 30px rgba(26,7,16,0.5);
    background:linear-gradient(160deg, var(--curtain-d), var(--plum));
  }
  .portrait .frame img{ width:100%; height:100%; object-fit:cover; display:block; }
  .portrait .frame .ph{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-family:'Caveat'; font-size:22px; color:#fff; text-align:center; padding:20px; }
  .corner{ position:absolute; width:16px; height:16px; z-index:3; }
  .corner.tl{ top:-4px; left:-4px; border-top:2px solid var(--bulb); border-left:2px solid var(--bulb); }
  .corner.tr{ top:-4px; right:-4px; border-top:2px solid var(--pink); border-right:2px solid var(--pink); }
  .corner.bl{ bottom:-4px; left:-4px; border-bottom:2px solid var(--bulb); border-left:2px solid var(--bulb); }
  .corner.br{ bottom:-4px; right:-4px; border-bottom:2px solid var(--pink); border-right:2px solid var(--pink); }

  .info{ animation:rise 1.1s .12s cubic-bezier(.2,.8,.2,1) both; }
  .eyebrow{ font-family:'Caveat'; font-size:22px; color:#fff; letter-spacing:.02em; display:flex; align-items:center; gap:10px; margin-bottom:10px; text-shadow:0 2px 12px rgba(0,0,0,0.5); }
  .eyebrow::before{ content:''; width:34px; height:2px; background:linear-gradient(90deg, var(--bulb), var(--pink)); }

  .wordmark h1{
    font-family:'Cinzel', serif; font-weight:800; font-size:clamp(38px, 6vw, 68px);
    letter-spacing:.04em; line-height:1;
    background:linear-gradient(100deg, var(--bulb) 0%, #fff 45%, var(--pink) 100%);
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
    filter:drop-shadow(0 2px 20px rgba(0,0,0,0.4));
  }

  .moons{ display:flex; align-items:center; gap:9px; margin:20px 0 4px; }
  .moons svg{ width:26px; height:26px; }
  .moons .mlabel{ font-family:'Caveat'; font-size:18px; color:#fff; margin-left:6px; text-shadow:0 2px 10px rgba(0,0,0,0.5); }

  .quote{
    margin:26px 0 0; padding:20px 22px; max-width:440px; position:relative;
    border:1px solid rgba(255,255,255,0.3); border-radius:14px;
    background:linear-gradient(180deg, rgba(61,21,38,0.55), rgba(26,7,16,0.4));
    backdrop-filter:blur(6px);
  }
  .quote::before{ content:'\201C'; position:absolute; top:-14px; left:16px; font-family:'Cinzel', serif; font-size:48px; color:var(--bulb); line-height:1; }
  .quote p{ font-style:italic; font-size:15.5px; line-height:1.7; color:#fff; text-shadow:0 1px 8px rgba(0,0,0,0.4); }
  .quote .attr{ display:block; margin-top:10px; font-family:'Caveat'; font-size:17px; color:var(--bulb); font-style:normal; }

  .enter-btn{
    margin-top:32px; position:relative; display:inline-flex; align-items:center; gap:12px;
    font-weight:800; font-size:15px; letter-spacing:.02em;
    padding:16px 42px; border-radius:999px; cursor:pointer; color:var(--ink); border:none;
    background:linear-gradient(100deg, var(--bulb), #fff 50%, var(--pink));
    background-size:200% 100%; background-position:0% 0;
    box-shadow:0 10px 30px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.6);
    transition:transform .2s, box-shadow .2s, background-position .5s; overflow:hidden;
  }
  .enter-btn:hover{ transform:translateY(-2px); background-position:100% 0; box-shadow:0 14px 40px rgba(0,0,0,0.45); }
  .enter-btn:active{ transform:translateY(1px); }
  .enter-btn:focus-visible{ outline:3px solid #fff; outline-offset:3px; }
  .enter-btn .moon-ic{ font-size:17px; animation:spin 8s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .enter-btn::after{ content:''; position:absolute; top:0; left:-60%; width:40%; height:100%; background:linear-gradient(100deg, transparent, rgba(255,255,255,0.6), transparent); transform:skewX(-18deg); animation:sheen 3.6s ease-in-out infinite; }
  @keyframes sheen{ 0%,60%{ left:-60%; } 85%,100%{ left:130%; } }
  .hint{ margin-top:16px; font-size:12px; color:#fff; opacity:.7; text-shadow:0 1px 8px rgba(0,0,0,0.5); }

  /* ---------- transisi mantra: dua warna bertemu ---------- */
  #veil{ position:fixed; inset:0; z-index:50; pointer-events:none; background:radial-gradient(circle at 50% 50%, #fff 0%, var(--bulb) 20%, var(--pink) 45%, var(--plum) 100%); opacity:0; transform:scale(0); border-radius:50%; transition:transform .9s cubic-bezier(.6,0,.4,1), opacity .9s ease; }
  body.leaving #veil{ opacity:1; transform:scale(3); }
  body.leaving .stage{ transition:opacity .5s, transform .6s; opacity:0; transform:scale(1.05); }

  @media (max-width:760px){
    .stage{ grid-template-columns:1fr; text-align:center; padding-top:70px; gap:30px; }
    .eyebrow, .wordmark, .moons{ justify-content:center; }
    .wordmark{ display:flex; }
    .quote{ margin-left:auto; margin-right:auto; text-align:left; }
    .info{ display:flex; flex-direction:column; align-items:center; }
  }
</style>
</head>
<body>

<div id="sky" aria-hidden="true"></div>
<div id="veil" aria-hidden="true"></div>

<main class="stage">
  <div class="portrait-col">
    <div class="portrait">
      <div class="halo"></div>
      <span class="corner tl"></span><span class="corner tr"></span>
      <span class="corner bl"></span><span class="corner br"></span>
      <div class="frame">
        <img src="daidaidai.jpg" alt="Aurhel Alana — Lana JKT48" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
        <div class="ph" style="display:none;">&#10022; potret Lana &#10022;<br><small>(taruh daidaidai.jpg di folder yang sama)</small></div>
      </div>
    </div>
  </div>

  <div class="info">
    <span class="eyebrow">&#10022; di bawah cahaya bulan</span>
    <div class="wordmark"><h1>LANAUTICA</h1></div>

    <div class="moons" title="100th Show &amp; Seitansai ke-20" aria-label="Dua perayaan">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15.5 3a9 9 0 1 0 5.5 8.3A7 7 0 0 1 15.5 3z" fill="#FFC85C"/></svg>
      <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9" fill="#FF6B9D"/></svg>
      <span class="mlabel">seratus panggung &amp; usia dua puluh</span>
    </div>

    <blockquote class="quote">
      <p>Dengan kekuatan bulan, aku akan menyihirmu dengan pesonaku.
      <span class="attr">&#8212; untuk Lana, di malam perayaannya</span></p>
    </blockquote>

    <button class="enter-btn" id="enterBtn">
      <span class="moon-ic">&#127769;</span> Masuk
    </button>
    <p class="hint">tekan untuk memilih perayaanmu</p>
  </div>
</main>

<script>
  // taburan bintang: campuran emas hangat & pink lembut di atas langit gelap
  (function(){
    const sky = document.getElementById('sky');
    const frag = document.createDocumentFragment();
    const palette = ['#FFE7B0', '#FF9DBE', '#FFFFFF', '#FFD98A'];
    const n = Math.min(90, Math.floor(window.innerWidth/12));
    for(let i=0;i<n;i++){
      const s = document.createElement('span');
      s.className = 'spark';
      const size = Math.random()*2.2 + 0.7;
      s.style.width = s.style.height = size + 'px';
      s.style.background = palette[Math.floor(Math.random()*palette.length)];
      s.style.left = Math.random()*100 + 'vw';
      s.style.top  = Math.random()*100 + 'vh';
      s.style.setProperty('--o', (Math.random()*0.6 + 0.35).toFixed(2));
      s.style.setProperty('--tw', (Math.random()*3 + 2).toFixed(1) + 's');
      s.style.animationDelay = (Math.random()*3).toFixed(1) + 's';
      frag.appendChild(s);
    }
    sky.appendChild(frag);
  })();

  document.getElementById('enterBtn').addEventListener('click', function(){
    if (matchMedia('(prefers-reduced-motion: reduce)').matches){ location.href = 'gate.html'; return; }
    document.body.classList.add('leaving');
    setTimeout(function(){ location.href = 'gate.html'; }, 850);
  });
</script>

</body>
</html>
