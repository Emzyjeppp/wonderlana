<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WonderLana — Pilih Perayaanmu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Fraunces:ital,opsz,wght@0,9..144,900;1,9..144,600&family=Plus+Jakarta+Sans:wght@600;700;800&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
<style>
  *{ box-sizing:border-box; margin:0; }
  html,body{ height:100%; }
  body{ font-family:'Plus Jakarta Sans', sans-serif; overflow:hidden; }

  .doors{ display:flex; height:100vh; width:100%; }

  .door{
    position:relative; overflow:hidden; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:60px 32px; text-decoration:none;
    flex:1 1 50%;
    transition:flex-grow .6s cubic-bezier(.4,0,.2,1);
  }
  /* saat satu pintu di-hover: dia melebar, yang lain menyempit & meredup */
  .doors:hover .door{ flex-grow:0.72; }
  .doors .door:hover{ flex-grow:1.7; }
  .door::after{ /* peneduh untuk pintu yang tidak dipilih */
    content:''; position:absolute; inset:0; background:#000; opacity:0;
    transition:opacity .6s ease; pointer-events:none; z-index:5;
  }
  .doors:hover .door:not(:hover)::after{ opacity:0.28; }

  /* ================= PINTU TEATER ================= */
  .door.theater{
    background:#2B0A16;
    background-image:
      radial-gradient(ellipse 70% 45% at 50% 8%, rgba(255,200,92,0.16), transparent 60%),
      radial-gradient(rgba(255,243,226,0.05) 1.4px, transparent 1.4px);
    background-size:auto, 26px 26px;
    color:#FFF3E2;
  }
  /* daun tirai kiri & kanan yang menyingkap saat hover */
  .curtain-panel{
    position:absolute; top:0; bottom:0; width:52%; z-index:3; pointer-events:none;
    background:
      repeating-linear-gradient(90deg, #A31840 0 22px, #C2274B 22px 44px, #8A1234 44px 66px);
    box-shadow:inset -20px 0 40px rgba(0,0,0,0.4);
    transition:transform .7s cubic-bezier(.5,0,.2,1);
  }
  .curtain-panel.left{ left:0; transform-origin:left; border-right:3px solid #6E0E28; }
  .curtain-panel.right{ right:0; transform-origin:right;
    background:repeating-linear-gradient(90deg, #8A1234 0 22px, #C2274B 22px 44px, #A31840 44px 66px);
    box-shadow:inset 20px 0 40px rgba(0,0,0,0.4);
  }
  /* jumbai bawah tirai */
  .curtain-panel::after{
    content:''; position:absolute; bottom:-14px; left:0; right:0; height:26px;
    background:radial-gradient(circle at 14px -2px, #C2274B 12px, transparent 13px) repeat-x;
    background-size:28px 26px;
  }
  .theater:hover .curtain-panel.left{ transform:translateX(-88%); }
  .theater:hover .curtain-panel.right{ transform:translateX(88%); }
  /* pelengkung emas atas panggung */
  .arch-lights{ position:absolute; top:0; left:0; right:0; height:8px; z-index:4;
    background:repeating-linear-gradient(90deg, #FFC85C 0 6px, transparent 6px 20px);
    filter:drop-shadow(0 0 6px rgba(255,200,92,0.7)); opacity:.85;
  }

  /* ================= PINTU PESTA ================= */
  .door.party{
    background:#FFF7F1;
    background-image:radial-gradient(rgba(255,107,157,0.13) 1.6px, transparent 1.6px);
    background-size:30px 30px;
    color:#47203C;
  }
  .bunting{ position:absolute; top:0; left:0; width:100%; z-index:3; pointer-events:none;
    transition:transform .6s ease; }
  .party:hover .bunting{ transform:translateY(-4px); }
  /* balon warna-warni yang melayang saat hover */
  .balloon{
    position:absolute; bottom:-90px; width:34px; height:44px; border-radius:50% 50% 48% 48%;
    z-index:2; opacity:0; pointer-events:none; transition:opacity .4s ease;
    box-shadow:inset -6px -6px 10px rgba(0,0,0,0.12), inset 5px 4px 8px rgba(255,255,255,0.5);
  }
  .balloon::after{ content:''; position:absolute; bottom:-8px; left:50%; transform:translateX(-50%);
    width:2px; height:12px; background:rgba(71,32,60,0.5); }
  .balloon::before{ content:''; position:absolute; bottom:-2px; left:50%; transform:translateX(-50%) rotate(45deg);
    width:7px; height:7px; background:inherit; }
  .party:hover .balloon{ opacity:1; animation:floatUp var(--dur,3.4s) ease-in infinite; }
  .balloon.b1{ left:8%;  background:#FF6B9D; --dur:3.6s; animation-delay:.0s; }
  .balloon.b2{ left:20%; background:#E8A93C; --dur:3.0s; animation-delay:.7s; width:28px; height:37px; }
  .balloon.b3{ left:33%; background:#BDE5D3; --dur:4.1s; animation-delay:.3s; }
  .balloon.b4{ right:30%; background:#FFD9E6; --dur:3.3s; animation-delay:1.1s; width:30px; height:39px; }
  .balloon.b5{ right:16%; background:#C97BE0; --dur:3.8s; animation-delay:.5s; }
  .balloon.b6{ right:6%;  background:#FF6B9D; --dur:3.1s; animation-delay:1.5s; width:26px; height:34px; }
  @keyframes floatUp{
    0%{ transform:translateY(0) rotate(-8deg); opacity:0; }
    12%{ opacity:.96; }
    50%{ transform:translateY(-55vh) rotate(6deg); }
    100%{ transform:translateY(-112vh) rotate(-4deg); opacity:0; }
  }

  /* confetti berjatuhan saat hover */
  .confetti{ position:absolute; top:-20px; width:9px; height:13px; z-index:2; opacity:0; pointer-events:none; }
  .party:hover .confetti{ animation:confFall var(--cdur,3s) linear infinite; }
  @keyframes confFall{
    0%{ transform:translateY(0) rotate(0); opacity:0; }
    10%{ opacity:1; }
    100%{ transform:translateY(105vh) rotate(680deg); opacity:0; }
  }

  /* semburat kilau lembut saat pesta di-hover */
  .party::before{
    content:''; position:absolute; inset:0; z-index:1; pointer-events:none; opacity:0;
    background:radial-gradient(ellipse 60% 45% at 50% 55%, rgba(255,107,157,0.18), transparent 65%);
    transition:opacity .6s ease;
  }
  .party:hover::before{ opacity:1; }

  /* ================= ISI PINTU ================= */
  .content{ position:relative; z-index:6; display:flex; flex-direction:column; align-items:center;
    transition:transform .6s cubic-bezier(.4,0,.2,1); }
  .door:hover .content{ transform:scale(1.06); }
  .icon{ font-size:clamp(44px,5vw,62px); margin-bottom:20px;
    transition:transform .5s cubic-bezier(.3,1.4,.5,1); }
  .door:hover .icon{ transform:translateY(-6px) scale(1.12); }

  .theater h2{
    font-family:'Bungee'; font-size:clamp(28px,3.6vw,46px); color:#FFC85C; line-height:1.14;
    text-shadow:0 0 24px rgba(255,200,92,0.5), 3px 3px 0 #8A1234; letter-spacing:.02em;
  }
  .party h2{ font-family:'Fraunces', serif; font-weight:900; font-size:clamp(30px,3.8vw,50px); line-height:1.08; }
  .party h2 em{ font-style:italic; color:#FF6B9D; text-shadow:3px 3px 0 #F7DFAE; }

  .sub{ font-family:'Caveat'; font-size:clamp(18px,2vw,23px); margin-top:12px; }
  .theater .sub{ color:#9FE3C7; }
  .party .sub{ color:#C93E6E; }

  .enter{
    margin-top:30px; font-weight:800; font-size:13.5px; letter-spacing:.12em; text-transform:uppercase;
    padding:15px 32px; border-radius:999px; display:inline-flex; align-items:center; gap:8px;
    transition:transform .25s, box-shadow .25s, gap .25s;
  }
  .theater .enter{ background:#FFC85C; color:#24060F; box-shadow:0 5px 0 #8A1234; }
  .party .enter{ background:#FF6B9D; color:#fff; border:2px solid #47203C; box-shadow:0 5px 0 #47203C; }
  .door:hover .enter{ gap:14px; }
  .theater:hover .enter{ transform:translateY(-3px); box-shadow:0 8px 0 #8A1234; }
  .party:hover .enter{ transform:translateY(-3px); box-shadow:0 8px 0 #47203C; }

  /* ================= BADGE TENGAH ================= */
  .center-badge{
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:20;
    width:118px; height:118px; border-radius:50%;
    background:#fff; border:3px solid #47203C;
    display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;
    box-shadow:0 14px 40px rgba(0,0,0,0.35);
    transition:opacity .4s ease, transform .5s ease; pointer-events:none;
  }
  .center-badge b{ font-family:'Fraunces', serif; font-weight:900; font-size:15px; color:#47203C; }
  .center-badge span{ font-family:'Caveat'; font-size:14px; color:#C93E6E; margin-top:1px; line-height:1.1; }
  /* badge menyingkir saat salah satu pintu dipilih, biar tak menutupi */
  .doors:hover ~ .center-badge{ opacity:0; transform:translate(-50%,-50%) scale(0.6); }

  /* tautan kembali kecil */
  .back{
    position:fixed; top:16px; left:50%; transform:translateX(-50%); z-index:25;
    font-size:12px; font-weight:700; color:#fff; text-decoration:none;
    background:rgba(0,0,0,0.35); padding:7px 16px; border-radius:999px; backdrop-filter:blur(4px);
    transition:background .2s;
  }
  .back:hover{ background:rgba(0,0,0,0.55); }

  @media (max-width:760px){
    .doors{ flex-direction:column; }
    .door{ min-height:50vh; }
    .doors:hover .door{ flex-grow:1; }              /* nonaktifkan efek lebar di mobile */
    .doors .door:hover{ flex-grow:1; }
    .doors:hover .door:not(:hover)::after{ opacity:0; }
    .curtain-panel{ width:52%; }
    .center-badge{ width:96px; height:96px; }
    .doors:hover ~ .center-badge{ opacity:1; transform:translate(-50%,-50%); }
  }
</style>
</head>
<body>

<div class="doors">
  <!-- ===== PINTU TEATER ===== -->
  <a class="door theater" href="show100.html" aria-label="Masuk ke 100th Show">
    <div class="arch-lights"></div>
    <span class="curtain-panel left"></span>
    <span class="curtain-panel right"></span>
    <div class="content">
      <span class="icon">🎭</span>
      <h2>100TH<br>SHOW</h2>
      <p class="sub">seratus panggung penuh cerita</p>
      <span class="enter">Masuk ke Teater →</span>
    </div>
  </a>

  <!-- ===== PINTU PESTA ===== -->
  <a class="door party" href="birthday.html" aria-label="Masuk ke Seitansai ke-20">
    <svg class="bunting" viewBox="0 0 1200 56" preserveAspectRatio="none" aria-hidden="true">
      <path d="M0,6 Q600,26 1200,6" fill="none" stroke="#47203C" stroke-width="2.5"/>
      <g stroke="#47203C" stroke-width="2">
        <polygon points="60,10 100,10 80,48" fill="#FF6B9D"/>
        <polygon points="200,14 240,14 220,52" fill="#E8A93C"/>
        <polygon points="340,17 380,17 360,55" fill="#BDE5D3"/>
        <polygon points="480,19 520,19 500,57" fill="#FFD9E6"/>
        <polygon points="620,19 660,19 640,57" fill="#FF6B9D"/>
        <polygon points="760,18 800,18 780,56" fill="#E8A93C"/>
        <polygon points="900,15 940,15 920,53" fill="#BDE5D3"/>
        <polygon points="1040,11 1080,11 1060,49" fill="#FFD9E6"/>
      </g>
    </svg>
    <span class="balloon b1"></span><span class="balloon b2"></span>
    <span class="balloon b3"></span><span class="balloon b4"></span>
    <span class="balloon b5"></span><span class="balloon b6"></span>
    <span class="confetti" style="left:85.5%;background:#FF6B9D;--cdur:3.6s;animation-delay:1.9s;transform:rotate(27deg);border-radius:50%;"></span>
    <span class="confetti" style="left:17.6%;background:#E8A93C;--cdur:3.6s;animation-delay:2.1s;transform:rotate(-24deg);border-radius:2px;"></span>
    <span class="confetti" style="left:82.5%;background:#BDE5D3;--cdur:3.4s;animation-delay:0.4s;transform:rotate(-4deg);border-radius:2px;"></span>
    <span class="confetti" style="left:40.6%;background:#FFD9E6;--cdur:2.5s;animation-delay:0.3s;transform:rotate(0deg);border-radius:50%;"></span>
    <span class="confetti" style="left:89.5%;background:#C97BE0;--cdur:3.2s;animation-delay:0.5s;transform:rotate(-10deg);border-radius:2px;"></span>
    <span class="confetti" style="left:60.3%;background:#FFF6C9;--cdur:3.6s;animation-delay:0.8s;transform:rotate(-25deg);border-radius:2px;"></span>
    <span class="confetti" style="left:60.5%;background:#FF6B9D;--cdur:3.9s;animation-delay:1.2s;transform:rotate(-25deg);border-radius:50%;"></span>
    <span class="confetti" style="left:22.6%;background:#E8A93C;--cdur:2.8s;animation-delay:0.5s;transform:rotate(-25deg);border-radius:2px;"></span>
    <span class="confetti" style="left:21.1%;background:#BDE5D3;--cdur:3.6s;animation-delay:0.7s;transform:rotate(14deg);border-radius:2px;"></span>
    <span class="confetti" style="left:27.1%;background:#FFD9E6;--cdur:3.5s;animation-delay:2.3s;transform:rotate(-13deg);border-radius:50%;"></span>
    <span class="confetti" style="left:67.5%;background:#C97BE0;--cdur:3.9s;animation-delay:0.5s;transform:rotate(-15deg);border-radius:2px;"></span>
    <span class="confetti" style="left:9.0%;background:#FFF6C9;--cdur:3.8s;animation-delay:1.5s;transform:rotate(-13deg);border-radius:2px;"></span>
    <span class="confetti" style="left:16.3%;background:#FF6B9D;--cdur:3.6s;animation-delay:1.5s;transform:rotate(-2deg);border-radius:50%;"></span>
    <span class="confetti" style="left:85.6%;background:#E8A93C;--cdur:4.1s;animation-delay:0.7s;transform:rotate(23deg);border-radius:2px;"></span>
    <div class="content">
      <span class="icon">🎂</span>
      <h2>Seitansai<br>ke-<em>20</em></h2>
      <p class="sub">selamat datang usia dua puluh</p>
      <span class="enter">Masuk ke Pesta →</span>
    </div>
  </a>
</div>

<div class="center-badge" aria-hidden="true">
  <b>WonderLana</b>
  <span>pilih<br>perayaanmu ✦</span>
</div>
